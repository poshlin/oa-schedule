<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="robots" content="noindex,nofollow">
<title>AI 改進建議審核 — Posh 專屬</title>
<style>
:root {
  color-scheme: light only;
  --orange: #FFA300; --orange-dk: #D48500; --orange-lt: #FFF4DD;
  --red: #FF5859;    --red-dk: #CC3344;    --red-lt: #FFEBEB;
  --teal: #00C4B3;   --teal-dk: #008F83;   --teal-lt: #DFFAF6;
  --green: #4CAF50;  --green-lt: #E8F5E9;
  --gray: #646569;   --dark: #2D2D2D;
  --bg: #F5F5F5;     --white: #FFFFFF;
  --border: #E5E5E5;
  --shadow: 0 1px 3px rgba(45,45,45,.06);
  --shadow-lg: 0 4px 16px rgba(45,45,45,.12);
  --font-zh: "微軟正黑體", "Microsoft JhengHei", "PingFang TC", sans-serif;
  --font-en: "Trebuchet MS", "Calibri", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font-zh); color: var(--dark); background: var(--bg); line-height: 1.6; }
.header { background: var(--dark); color: var(--white); padding: 16px 24px; }
.header__inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 18px; }
.header__badge { background: var(--orange); color: var(--white); padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 8px; }
.controls { max-width: 1280px; margin: 16px auto; padding: 0 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.tab { padding: 8px 16px; border: 2px solid var(--border); background: var(--white); border-radius: 6px; cursor: pointer; font-family: var(--font-zh); font-weight: 700; font-size: 14px; }
.tab.active { background: var(--dark); color: var(--white); border-color: var(--dark); }
.refresh-btn { margin-left: auto; padding: 8px 16px; background: var(--orange); color: var(--white); border: none; border-radius: 6px; cursor: pointer; font-weight: 700; }
.refresh-btn:hover { background: var(--orange-dk); }
.status { max-width: 1280px; margin: 8px auto; padding: 0 24px; font-size: 13px; color: var(--gray); }
.items { max-width: 1280px; margin: 16px auto 32px; padding: 0 24px; display: grid; gap: 14px; }
.item { background: var(--white); border-radius: 12px; box-shadow: var(--shadow); padding: 18px 22px; border-left: 5px solid var(--orange); }
.item--rejected { opacity: .6; border-left-color: var(--gray); }
.item--applied { border-left-color: var(--green); }
.item__head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.item__id { font-family: var(--font-en); font-size: 12px; background: var(--bg); padding: 2px 8px; border-radius: 4px; font-weight: 700; color: var(--gray); }
.item__chapter { background: var(--orange-lt); color: var(--orange-dk); padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 700; }
.item__mode { font-size: 11px; color: var(--gray); padding: 2px 6px; background: var(--bg); border-radius: 3px; }
.item__reporter { font-size: 12px; color: var(--gray); }
.item__date { font-family: var(--font-en); font-size: 11px; color: var(--gray); margin-left: auto; }
.item__summary { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: var(--dark); }
.diff { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.diff__col { background: var(--bg); border-radius: 6px; padding: 12px; }
.diff__col h4 { font-size: 12px; color: var(--gray); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.diff__col--current pre { white-space: pre-wrap; font-family: var(--font-zh); font-size: 13px; line-height: 1.6; color: var(--red-dk); background: var(--red-lt); padding: 10px; border-radius: 4px; max-height: 200px; overflow: auto; }
.diff__col--proposed pre { white-space: pre-wrap; font-family: var(--font-zh); font-size: 13px; line-height: 1.6; color: var(--green); background: var(--green-lt); padding: 10px; border-radius: 4px; max-height: 200px; overflow: auto; }
.reasoning { font-size: 13px; color: var(--gray); background: var(--bg); padding: 10px 14px; border-radius: 6px; margin-bottom: 12px; border-left: 3px solid var(--teal); }
.reasoning b { color: var(--dark); }
.flags { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.flag { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.flag--confidence-high { background: var(--green-lt); color: var(--green); }
.flag--confidence-medium { background: var(--orange-lt); color: var(--orange-dk); }
.flag--confidence-low { background: var(--red-lt); color: var(--red-dk); }
.flag--needs-decision { background: var(--red); color: var(--white); }
.flag--category { background: var(--teal-lt); color: var(--teal-dk); }
.conversation-toggle { font-size: 12px; color: var(--orange-dk); cursor: pointer; margin-bottom: 8px; display: inline-block; }
.conversation-toggle:hover { text-decoration: underline; }
.conversation { display: none; background: var(--bg); border-radius: 6px; padding: 12px; font-size: 12px; max-height: 240px; overflow: auto; margin-bottom: 12px; white-space: pre-wrap; line-height: 1.6; }
.conversation.show { display: block; }
.actions { display: flex; gap: 8px; padding-top: 10px; border-top: 1px dashed var(--border); }
.btn { padding: 8px 18px; border-radius: 6px; border: none; font-family: var(--font-zh); font-weight: 700; cursor: pointer; font-size: 13px; transition: background .12s; }
.btn--approve { background: var(--green); color: var(--white); }
.btn--approve:hover { background: #3d8c40; }
.btn--reject { background: var(--white); color: var(--red-dk); border: 1px solid var(--red); }
.btn--reject:hover { background: var(--red-lt); }
.btn--edit { background: var(--white); color: var(--gray); border: 1px solid var(--border); }
.btn--edit:hover { background: var(--bg); }
.status-tag { padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 700; }
.status-tag--applied { background: var(--green-lt); color: var(--green); }
.status-tag--rejected { background: var(--red-lt); color: var(--red-dk); }
.empty { text-align: center; padding: 80px 20px; color: var(--gray); }
.empty__icon { font-size: 48px; margin-bottom: 12px; }
.loading { text-align: center; padding: 40px 20px; color: var(--gray); }
.error-banner { background: var(--red-lt); color: var(--red-dk); padding: 14px 20px; border-radius: 8px; margin: 16px 24px; max-width: 1280px; }
@media (max-width: 720px) {
  .diff { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header__inner">
    <h1>📋 AI 改進建議審核</h1>
    <span class="header__badge">Posh 專屬</span>
    <span style="margin-left:auto;font-size:12px;color:#999">v1.0</span>
  </div>
</header>

<div class="controls">
  <button class="tab active" data-status="pending" type="button">待審 (<span id="count-pending">0</span>)</button>
  <button class="tab" data-status="applied" type="button">已採納 (<span id="count-applied">0</span>)</button>
  <button class="tab" data-status="rejected" type="button">已拒絕 (<span id="count-rejected">0</span>)</button>
  <button class="tab" data-status="all" type="button">全部</button>
  <button class="refresh-btn" type="button" onclick="loadItems()">🔄 重新整理</button>
</div>

<div class="status" id="status-text">準備載入...</div>
<div class="items" id="items-list"></div>

<script>
// 從 URL ?key=XXX 取得密鑰
function getSecret() {
  const params = new URLSearchParams(window.location.search);
  return params.get("key") || localStorage.getItem("review_secret") || "";
}
function setSecret(s) {
  localStorage.setItem("review_secret", s);
}

// 配置（部署後修改）
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/REPLACE_WITH_YOUR_DEPLOYMENT_ID/exec";

let currentStatus = "pending";
let allItems = [];

async function loadItems() {
  const secret = getSecret();
  if (!secret) {
    const s = prompt("請輸入 review 密鑰（之後會記住）：");
    if (!s) return;
    setSecret(s);
  }

  document.getElementById("items-list").innerHTML = '<div class="loading">⏳ 載入中...</div>';
  document.getElementById("status-text").textContent = "載入中...";

  if (APPS_SCRIPT_URL.includes("REPLACE_WITH_")) {
    document.getElementById("items-list").innerHTML =
      '<div class="error-banner">⚙️ APPS_SCRIPT_URL 尚未配置。請編輯 review.html 第 ~85 行，填入你部署的 Apps Script Web App URL。詳見 ai-feedback/README.md。</div>';
    return;
  }

  try {
    const url = `${APPS_SCRIPT_URL}?action=list&status=all&secret=${encodeURIComponent(getSecret())}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    if (data.error) {
      if (data.error === "unauthorized") {
        localStorage.removeItem("review_secret");
        alert("密鑰錯誤，請重新輸入");
        loadItems();
        return;
      }
      throw new Error(data.error);
    }
    allItems = data.items || [];
    updateCounts();
    renderItems();
  } catch (err) {
    document.getElementById("items-list").innerHTML =
      `<div class="error-banner">❌ 載入失敗：${err.message}</div>`;
    document.getElementById("status-text").textContent = "載入失敗";
  }
}

function updateCounts() {
  const counts = { pending: 0, applied: 0, rejected: 0 };
  allItems.forEach(it => { if (counts[it.status] !== undefined) counts[it.status]++; });
  document.getElementById("count-pending").textContent = counts.pending;
  document.getElementById("count-applied").textContent = counts.applied;
  document.getElementById("count-rejected").textContent = counts.rejected;
}

function renderItems() {
  const filtered = currentStatus === "all"
    ? allItems
    : allItems.filter(it => it.status === currentStatus);

  document.getElementById("status-text").textContent =
    `${currentStatus === "all" ? "全部" : currentStatus} ・ 共 ${filtered.length} 筆`;

  if (filtered.length === 0) {
    document.getElementById("items-list").innerHTML =
      '<div class="empty"><div class="empty__icon">🎉</div>沒有此分類的項目</div>';
    return;
  }

  // 排序：pending 先按時間倒序，其他按 posh_action_at 倒序
  filtered.sort((a, b) => {
    const da = new Date(a.posh_action_at || a.timestamp);
    const db = new Date(b.posh_action_at || b.timestamp);
    return db - da;
  });

  document.getElementById("items-list").innerHTML = filtered.map(renderItem).join("");
}

function renderItem(it) {
  const status = it.status || "pending";
  const cls = `item item--${status}`;
  const confidence = it.confidence || "medium";
  const needsDecision = String(it.needs_posh_decision).toUpperCase() === "TRUE";

  const flags = [
    `<span class="flag flag--category">${it.category || "other"}</span>`,
    `<span class="flag flag--confidence-${confidence}">信心 ${confidence}</span>`,
    needsDecision ? `<span class="flag flag--needs-decision">⚠️ 需 Posh 決定</span>` : ""
  ].filter(Boolean).join("");

  const actions = status === "pending"
    ? `<div class="actions">
        <button class="btn btn--approve" onclick="approve('${it.row_id}')">✅ 採納並 commit</button>
        <button class="btn btn--reject" onclick="reject('${it.row_id}')">❌ 拒絕</button>
        <button class="btn btn--edit" onclick="editAndApprove('${it.row_id}')">✏️ 修改後採納</button>
       </div>`
    : `<div class="actions">
        <span class="status-tag status-tag--${status}">${status === "applied" ? "✅ 已採納" : "❌ 已拒絕"}</span>
        ${it.commit_sha ? `<span style="font-family:monospace;font-size:11px;color:#999">commit ${String(it.commit_sha).substring(0,7)}</span>` : ""}
       </div>`;

  return `
    <div class="${cls}" id="item-${it.row_id}">
      <div class="item__head">
        <span class="item__id">${it.row_id}</span>
        <span class="item__chapter">${it.chapter_id}</span>
        <span class="item__mode">${it.mode === "suggest" ? "💡 建議" : "⚠️ 回報"}</span>
        <span class="item__reporter">by ${it.reporter}</span>
        <span class="item__date">${new Date(it.timestamp).toLocaleString("zh-TW")}</span>
      </div>
      <div class="item__summary">${escapeHtml(it.summary)}</div>
      <div class="flags">${flags}</div>
      <div class="diff">
        <div class="diff__col diff__col--current">
          <h4>📕 目前文字</h4>
          <pre>${escapeHtml(it.current_text || "（無對應原文）")}</pre>
        </div>
        <div class="diff__col diff__col--proposed">
          <h4>📗 建議改成</h4>
          <pre id="proposed-${it.row_id}">${escapeHtml(it.proposed_text)}</pre>
        </div>
      </div>
      <div class="reasoning"><b>AI 整理理由：</b>${escapeHtml(it.reasoning)}</div>
      ${needsDecision && it.needs_posh_reason ? `<div class="reasoning" style="border-left-color:#FF5859"><b>⚠️ 為何需要 Posh：</b>${escapeHtml(it.needs_posh_reason)}</div>` : ""}
      <a class="conversation-toggle" onclick="toggleConv('${it.row_id}')">📜 展開原始對話</a>
      <div class="conversation" id="conv-${it.row_id}">${escapeHtml(it.conversation_log || "（無對話紀錄）")}</div>
      ${actions}
    </div>`;
}

function toggleConv(id) {
  document.getElementById("conv-" + id).classList.toggle("show");
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

async function approve(rowId) {
  if (!confirm("確定採納此建議？這會直接 commit 並 push 到 GitHub。")) return;
  await postAction("apply", { row_id: rowId });
}

async function reject(rowId) {
  const reason = prompt("拒絕的理由（可留空，但建議寫一句讓提案者知道為什麼）：");
  if (reason === null) return;
  await postAction("reject", { row_id: rowId, reason });
}

async function editAndApprove(rowId) {
  const proposedEl = document.getElementById("proposed-" + rowId);
  const current = proposedEl.textContent;
  const edited = prompt("修改建議文字（會用這個版本去 commit）：", current);
  if (edited === null || edited === current) return;
  await postAction("apply", { row_id: rowId, override_proposed: edited });
}

async function postAction(action, extra) {
  try {
    const body = { action, secret: getSecret(), ...extra };
    const r = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },  // 避免 CORS preflight；Apps Script 端讀 e.postData.contents
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (data.error) {
      alert("失敗：" + data.error);
      return;
    }
    alert(action === "apply" ? `✅ 已 commit\nSHA: ${data.commit_sha || ""}` : "✅ 已拒絕");
    loadItems();
  } catch (err) {
    alert("錯誤：" + err.message);
  }
}

// Tab 切換
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    currentStatus = tab.dataset.status;
    renderItems();
  });
});

loadItems();
</script>

</body>
</html>
