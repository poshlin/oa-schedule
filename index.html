<meta property="og:title" content="即時開班查詢 — 橘子蘋果程式學苑">

<style>
/* =========================================================
   橘子蘋果即時開班查詢 — 品牌規範 v2.0
   主色：橘 #FFA300 / 蘋果紅 #FF5859 / 藍綠 #00C4B3
   ========================================================= */
:root {
  color-scheme: light only;
  --orange:     #FFA300;
  --orange-dk:  #D48500;
  --red:        #FF5859;
  --red-dk:     #CC3344;
  --teal:       #00C4B3;
  --teal-dk:    #008F83;
  --gray:       #646569;
  --dark:       #2D2D2D;
  --bg:         #F5F5F5;
  --white:      #FFFFFF;
  --shadow:     0 2px 8px rgba(45, 45, 45, 0.08);
  --shadow-lg:  0 4px 16px rgba(45, 45, 45, 0.12);

  --font-zh: "微軟正黑體", "Microsoft JhengHei", "PingFang TC", sans-serif;
  --font-en: "Trebuchet MS", "Calibri", sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font-zh);
  color: var(--dark);
  background: var(--bg);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

.header {
  background: var(--white);
  border-bottom: 4px solid var(--orange);
  padding: 16px 20px;
  position: sticky; top: 0; z-index: 10;
  box-shadow: var(--shadow);
}
.header__inner {
  max-width: 960px; margin: 0 auto;
  display: flex; align-items: center; gap: 16px;
}
.header__logo { height: 30px; width: auto; flex-shrink: 0; }
.header__title {
  font-size: 18px; font-weight: 700; color: var(--dark);
  border-left: 3px solid var(--orange); padding-left: 12px;
}
.header__title small {
  display: block; font-size: 12px; color: var(--gray); font-weight: 400;
  margin-top: 2px;
}

.hero {
  background: linear-gradient(135deg, var(--orange) 0%, #FFB733 100%);
  color: var(--white);
  padding: 32px 20px 36px;
  position: relative; overflow: hidden;
}
.hero::after {
  content: "";
  position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px;
  background: var(--teal); opacity: 0.18;
  border-radius: 50%;
}
.hero__inner { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }
.hero h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; color: var(--white); }
.hero p { font-size: 14px; opacity: 0.92; color: var(--white); }

.filters {
  max-width: 960px; margin: -20px auto 0;
  padding: 0 20px;
  position: relative; z-index: 2;
}
.filters__card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 20px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.btn-apply {
  grid-column: 1 / -1;
  background: var(--orange);
  color: var(--white);
  border: none;
  border-radius: 8px;
  padding: 14px 20px;
  margin-top: 4px;
  font-family: var(--font-zh);
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-apply:hover { background: var(--orange-dk); }
.btn-apply:active { transform: scale(0.98); }
.btn-apply::after { content: "→"; font-family: var(--font-en); }
.filter-group label {
  display: block;
  font-size: 12px; font-weight: 700; color: var(--gray);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.filter-group select {
  width: 100%;
  padding: 10px 14px;
  font-family: var(--font-zh);
  font-size: 15px;
  color: var(--dark);
  background: var(--bg);
  border: 2px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: border-color .15s;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%23646569' d='M6 8L0 0h12z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 10px;
  padding-right: 36px;
}
.filter-group select:focus {
  outline: none;
  border-color: var(--orange);
  background-color: var(--white);
}
.filter-summary {
  max-width: 960px; margin: 16px auto 0;
  padding: 0 20px;
  font-size: 13px; color: var(--gray);
  display: flex; justify-content: space-between; align-items: center;
}
.btn-reset {
  background: none; border: none; cursor: pointer;
  color: var(--orange); font-weight: 700; font-size: 13px;
  font-family: var(--font-zh);
}
.btn-reset:hover { color: var(--orange-dk); }

.results {
  max-width: 960px; margin: 20px auto 40px;
  padding: 0 20px;
  display: grid; gap: 14px;
}

.card {
  background: var(--white);
  border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  align-items: center;
  border-left: 5px solid var(--orange);
  transition: box-shadow .15s, transform .15s;
}
.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.card--online { border-left-color: var(--teal); }
.card--minecraft { border-left-color: var(--red); }
.card--scratch { border-left-color: var(--teal); }

.card__main { min-width: 0; }
.card__top {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.tag {
  display: inline-block;
  font-size: 11px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px;
  background: var(--bg); color: var(--gray);
  letter-spacing: 0.3px;
}
.tag--course { background: var(--orange); color: var(--white); }
.tag--online { background: var(--teal); color: var(--white); }
.tag--level { background: #FFEFC9; color: var(--orange-dk); }

.card__classroom {
  font-size: 17px; font-weight: 700; color: var(--dark);
}
.card__time {
  font-family: var(--font-en);
  font-size: 18px; font-weight: 700;
  color: var(--orange-dk);
  margin: 6px 0 4px;
}
.card__address {
  font-size: 13px; color: var(--gray);
  display: flex; align-items: flex-start; gap: 6px;
}
.card__address::before { content: "📍"; flex-shrink: 0; }

.card__cta {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--orange); color: var(--white);
  font-family: var(--font-zh);
  font-weight: 700; font-size: 14px;
  padding: 12px 18px;
  border-radius: 8px;
  text-decoration: none;
  white-space: nowrap;
  transition: background .15s, transform .15s;
  border: none; cursor: pointer;
}
.card__cta:hover { background: var(--orange-dk); transform: translateY(-1px); }
.card__cta::after { content: "→"; font-family: var(--font-en); }

.empty {
  text-align: center; padding: 48px 20px;
  background: var(--white); border-radius: 12px;
  box-shadow: var(--shadow);
}
.empty__icon { font-size: 48px; margin-bottom: 12px; }
.empty__title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.empty__desc { font-size: 14px; color: var(--gray); margin-bottom: 18px; }

.bottom-cta {
  max-width: 960px; margin: 0 auto 40px;
  padding: 28px 20px;
  background: var(--dark);
  color: var(--white);
  border-radius: 12px;
  text-align: center;
  position: relative; overflow: hidden;
}
.bottom-cta::before {
  content: "";
  position: absolute; bottom: -30px; left: -30px;
  width: 100px; height: 100px;
  background: var(--orange); opacity: 0.25;
  border-radius: 50%;
}
.bottom-cta::after {
  content: "";
  position: absolute; top: -20px; right: -20px;
  width: 80px; height: 80px;
  background: var(--teal); opacity: 0.2;
  border-radius: 50%;
}
.bottom-cta h2 { font-size: 18px; margin-bottom: 6px; position: relative; z-index: 1; color: var(--white); }
.bottom-cta p { font-size: 13px; opacity: 0.85; margin-bottom: 18px; position: relative; z-index: 1; }
.bottom-cta__btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--orange); color: var(--white);
  font-family: var(--font-zh);
  font-weight: 700; font-size: 15px;
  padding: 14px 28px;
  border-radius: 8px;
  text-decoration: none;
  position: relative; z-index: 1;
  transition: background .15s;
}
.bottom-cta__btn:hover { background: var(--orange-dk); }

.footer {
  text-align: center; font-size: 12px; color: var(--gray);
  padding: 20px;
  border-top: 1px solid #E5E5E5;
}
.footer a { color: var(--orange); text-decoration: none; }
.footer .updated { display: inline-block; margin-left: 8px; font-family: var(--font-en); }

@media (max-width: 640px) {
  .header__title { font-size: 16px; }
  .header__logo { height: 26px; }
  .hero { padding: 24px 20px 36px; }
  .hero h1 { font-size: 20px; }
  .filters { margin-top: -20px; }
  .filters__card { grid-template-columns: 1fr; gap: 10px; padding: 16px; }
  .card { grid-template-columns: 1fr; gap: 12px; }
  .card__cta { justify-content: center; width: 100%; }
  .card__time { font-size: 17px; }
}
</style>

<!-- ============================================================
     主程式
     ============================================================ -->
<script>
(function() {
  "use strict";
  const DAY_LABEL = { Sat: "週六", Sun: "週日", Mon: "週一", Tue: "週二", Wed: "週三", Thu: "週四", Fri: "週五" };
  const BOOKING_URL = "https://lin.ee/your-line-oa-link";  // TODO: 改成正式 LINE OA 預約連結
  const CITY_ORDER = ["臺北市", "新北市", "基隆市", "桃園市", "新竹市", "新竹縣", "苗栗縣", "臺中市", "嘉義市", "臺南市", "高雄市", "屏東縣", "Kuala Lumpur", "線上"];

  // corp 內部 schedule course_id → 家長端要顯示的課程 id（一對多）
  // 「菁英」這個時段實際涵蓋三種教學內容，學生選一種；其他課程都是獨立的一種對一種
  // 數學、選手班不開放試聽 → 不列在這
  const COURSE_INTERNAL_TO_DISPLAY = {
    elite:           ["scratch", "python", "javascript"],
    creative_blocks: ["creative_blocks"],
    minecraft:       ["minecraft"],
    roblox:          ["roblox"]
  };

  const classrooms = window.OA_CLASSROOMS.classrooms;
  const courses    = window.OA_CLASSROOMS.courses;
  const timeSlots  = window.OA_CLASSROOMS.time_slots;
  const schedules  = window.OA_SCHEDULE.schedules;

  const filter = { classroom: "all", course: "all" };

  function $(id) { return document.getElementById(id); }
  function roomById(id) { return classrooms.find(r => r.id === id) || { name: id, address: "", city: "" }; }
  function courseById(id) { return courses.find(c => c.id === id) || { name: id }; }
  function displayTagsOf(scheduleItem) { return COURSE_INTERNAL_TO_DISPLAY[scheduleItem.course_id] || []; }

  function readUrlParams() {
    const p = new URLSearchParams(window.location.search);
    if (p.has("classroom")) filter.classroom = p.get("classroom");
    if (p.has("course"))    filter.course = p.get("course");
  }
  function syncUrl() {
    const p = new URLSearchParams();
    for (const k of ["classroom", "course"]) {
      if (filter[k] !== "all") p.set(k, filter[k]);
    }
    const q = p.toString();
    window.history.replaceState(null, "", q ? "?" + q : window.location.pathname);
  }

  function buildFilters() {
    const cities = CITY_ORDER.filter(c => classrooms.some(r => r.city === c));

    // 教室下拉用 optgroup 按城市分組
    let classroomHtml = '<option value="all">全部教室</option>';
    cities.forEach(city => {
      const rooms = classrooms.filter(r => r.city === city);
      if (rooms.length === 0) return;
      classroomHtml += `<optgroup label="${city}">`;
      rooms.forEach(r => {
        classroomHtml += `<option value="${r.id}">${r.name}</option>`;
      });
      classroomHtml += '</optgroup>';
    });
    $("filter-classroom").innerHTML = classroomHtml;
    $("filter-classroom").value = filter.classroom;

    $("filter-course").innerHTML = '<option value="all">全部課程</option>' +
      courses.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
    $("filter-course").value = filter.course;
  }

  function applyFilters() {
    return schedules.filter(s => {
      const tags = displayTagsOf(s);
      if (tags.length === 0) return false;  // 對應表沒列的內部課程（數學、選手班）一律不顯示

      const r = roomById(s.classroom_id);
      if (filter.classroom !== "all" && r.id !== filter.classroom) return false;
      if (filter.course !== "all" && !tags.includes(filter.course)) return false;
      return true;
    });
  }

  function timeLabel(slot) { return timeSlots[slot] || `第 ${slot} 節`; }

  // 卡片上要顯示的課程名稱：有過濾就只顯示過濾的那一個，沒過濾就顯示時段對應的所有家長端課程
  function courseLabelOf(s) {
    const tags = displayTagsOf(s);
    if (filter.course !== "all" && tags.includes(filter.course)) {
      const c = courseById(filter.course);
      return c.name;
    }
    return tags.map(t => courseById(t).name).join(" / ");
  }

  function statusText(count) {
    const parts = [];
    if (filter.classroom !== "all") parts.push(roomById(filter.classroom).name);
    if (filter.course !== "all")    parts.push(courseById(filter.course).name);
    const prefix = parts.length > 0 ? `${parts.join("・")}・` : "";
    return `${prefix}共 ${count} 個開班時段`;
  }

  function buildBookingLink(s) {
    const r = roomById(s.classroom_id);
    const c = courseById(s.course_id);
    const msg = `我想預約試聽：\n${r.name} / ${c.name}\n${DAY_LABEL[s.day] || s.day} ${timeLabel(s.time_slot)}`;
    return BOOKING_URL + "?text=" + encodeURIComponent(msg);
  }

  function render() {
    const list = applyFilters();
    $("result-count").textContent = statusText(list.length);

    const wrap = $("results");
    if (list.length === 0) {
      wrap.innerHTML = `
        <div class="empty">
          <div class="empty__icon">🔍</div>
          <div class="empty__title">目前沒有符合條件的時段</div>
          <div class="empty__desc">試試調整篩選條件，或聯絡專員客製化安排</div>
          <a class="card__cta" href="${BOOKING_URL}" target="_blank" rel="noopener">聯絡專員</a>
        </div>`;
      return;
    }

    list.sort((a, b) => {
      const ra = roomById(a.classroom_id), rb = roomById(b.classroom_id);
      if (ra.city !== rb.city) {
        const ia = CITY_ORDER.indexOf(ra.city), ib = CITY_ORDER.indexOf(rb.city);
        return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
      }
      if (ra.name !== rb.name) return ra.name.localeCompare(rb.name, "zh-Hant");
      if (a.day !== b.day) return a.day === "Sat" ? -1 : 1;
      return a.time_slot - b.time_slot;
    });

    wrap.innerHTML = list.map(s => {
      const r = roomById(s.classroom_id);
      const day = DAY_LABEL[s.day] || s.day;
      const mod = r.is_online ? "card--online" :
                  s.course_id === "creative_blocks" ? "card--scratch" :
                  s.course_id === "minecraft" ? "card--minecraft" : "";
      const onlineTag = r.is_online ? `<span class="tag tag--online">線上</span>` : "";
      const levelTag  = s.course_level ? `<span class="tag tag--level">${s.course_level}</span>` : "";
      return `
        <div class="card ${mod}">
          <div class="card__main">
            <div class="card__top">
              <span class="tag tag--course">${courseLabelOf(s)}</span>
              ${onlineTag}${levelTag}
            </div>
            <div class="card__classroom">${r.name}</div>
            <div class="card__time">${day} ${timeLabel(s.time_slot)}</div>
            ${r.address ? `<div class="card__address">${r.address}</div>` : ""}
          </div>
          <a class="card__cta" href="${buildBookingLink(s)}" target="_blank" rel="noopener">預約試聽</a>
        </div>`;
    }).join("");
  }

  // 從 DOM 讀回 filter state，按下「查詢」時呼叫
  function applyFromDOM() {
    filter.classroom = $("filter-classroom").value;
    filter.course    = $("filter-course").value;
    syncUrl();
    render();
  }

  function resetFilters() {
    filter.classroom = filter.course = "all";
    buildFilters();
    syncUrl();
    render();
  }

  // 掛到 window 讓 HTML inline onclick 能直接呼叫（addEventListener 在某些預覽環境會被擋）
  window.__oaApply = applyFromDOM;
  window.__oaReset = resetFilters;

  function init() {
    if (window.OA_SCHEDULE && window.OA_SCHEDULE.updated_at) {
      $("updated-at").textContent = window.OA_SCHEDULE.updated_at;
    }
    readUrlParams();
    buildFilters();
    // addEventListener 作為備援（正式部署到 Cloudflare 後就走這條路徑）
    $("btn-apply").addEventListener("click", applyFromDOM);
    $("btn-reset").addEventListener("click", resetFilters);
    render();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
