<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="robots" content="noindex,nofollow">
<title>業務規則索引 — 橘子蘋果</title>
<style>
:root {
  color-scheme: light only;
  --orange: #FFA300; --orange-dk: #D48500;  --orange-lt: #FFF4DD;
  --red: #FF5859;    --red-dk: #CC3344;     --red-lt: #FFEBEB;
  --teal: #00C4B3;   --teal-dk: #008F83;    --teal-lt: #DFFAF6;
  --gray: #646569;   --dark: #2D2D2D;
  --bg: #F5F5F5;     --white: #FFFFFF;
  --border: #E5E5E5;
  --shadow: 0 1px 3px rgba(45,45,45,.06);
  --shadow-md: 0 2px 8px rgba(45,45,45,.08);
  --shadow-lg: 0 4px 16px rgba(45,45,45,.12);
  --font-zh: "微軟正黑體", "Microsoft JhengHei", "PingFang TC", sans-serif;
  --font-en: "Trebuchet MS", "Calibri", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font-zh); color: var(--dark); background: var(--bg); line-height: 1.6; -webkit-font-smoothing: antialiased; }

/* ───── Header ───── */
.header { background: var(--white); border-bottom: 4px solid var(--dark); padding: 16px 20px; position: sticky; top: 0; z-index: 30; box-shadow: var(--shadow); }
.header__inner { max-width: 1120px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
.header__logo { height: 30px; }
.header__title { font-size: 18px; font-weight: 700; border-left: 3px solid var(--dark); padding-left: 12px; }
.header__title small { display: block; font-size: 12px; color: var(--gray); font-weight: 400; margin-top: 2px; }
.staff-badge { background: var(--dark); color: var(--white); font-size: 11px; padding: 3px 8px; border-radius: 4px; margin-left: 8px; font-weight: 700; letter-spacing: 0.5px; }

/* ───── Hero ───── */
.hero { background: linear-gradient(135deg, #2D2D2D 0%, #4A4A4A 100%); color: var(--white); padding: 24px 20px 28px; position: relative; overflow: hidden; }
.hero::after { content: ""; position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; background: var(--orange); opacity: .15; border-radius: 50%; }
.hero__inner { max-width: 1120px; margin: 0 auto; position: relative; z-index: 1; }
.hero h1 { font-size: 20px; margin-bottom: 4px; color: var(--white); }
.hero p { font-size: 13px; opacity: .85; }
.tier-legend { display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; font-size: 12px; }
.tier-legend span { display: inline-flex; align-items: center; gap: 6px; }
.tier-legend .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
.tier-legend .dot--commission { background: var(--red); }
.tier-legend .dot--operational { background: var(--orange); }
.tier-legend .dot--pending { background: var(--teal); }

/* ───── Controls ───── */
.controls { max-width: 1120px; margin: -14px auto 0; padding: 0 20px; position: relative; z-index: 5; }
.controls__card { background: var(--white); border-radius: 12px; box-shadow: var(--shadow-lg); padding: 16px 18px; display: grid; gap: 12px; }
.controls__row1 { display: grid; grid-template-columns: 1fr 200px; gap: 12px; align-items: stretch; }
.search-input { width: 100%; padding: 12px 16px; font-size: 15px; font-family: var(--font-zh); color: var(--dark); background: var(--bg); border: 2px solid transparent; border-radius: 8px; }
.search-input:focus { outline: none; border-color: var(--orange); background: var(--white); }
.role-select { padding: 12px 36px 12px 14px; font-size: 15px; font-weight: 700; font-family: var(--font-zh); color: var(--dark); background: var(--white); border: 2px solid var(--dark); border-radius: 8px; cursor: pointer;
  -webkit-appearance: none; -moz-appearance: none; appearance: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%232D2D2D' d='M6 8L0 0h12z'/></svg>");
  background-repeat: no-repeat; background-position: right 12px center; background-size: 10px;
}
.role-select:focus { outline: none; border-color: var(--orange); }

.controls__row2 { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.tier-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tier-tab { padding: 7px 12px; border-radius: 6px; border: 2px solid var(--bg); background: var(--white); color: var(--dark); font-family: var(--font-zh); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; }
.tier-tab:hover { border-color: var(--gray); }
.tier-tab.active { background: var(--dark); color: var(--white); border-color: var(--dark); }
.tier-tab.active--commission { background: var(--red); border-color: var(--red); }
.tier-tab.active--operational { background: var(--orange); border-color: var(--orange); }
.tier-tab.active--pending { background: var(--teal); border-color: var(--teal); }

.toggle-all { margin-left: auto; background: var(--bg); border: 2px solid var(--border); color: var(--dark); padding: 7px 12px; border-radius: 6px; font-family: var(--font-zh); font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; }
.toggle-all:hover { background: var(--white); border-color: var(--gray); }

/* ───── Quick-jump chip list ───── */
.quick-jump { max-width: 1120px; margin: 12px auto 0; padding: 0 20px; }
.quick-jump__inner {
  background: var(--white); border-radius: 8px; padding: 10px 12px; box-shadow: var(--shadow);
  display: flex; gap: 6px; overflow-x: auto; align-items: center;
  scrollbar-width: thin;
}
.quick-jump__label { font-size: 12px; color: var(--gray); font-weight: 700; white-space: nowrap; padding: 0 4px; }
.chip { padding: 5px 12px; border-radius: 16px; background: var(--bg); color: var(--dark); font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid transparent; transition: all .15s; text-decoration: none; }
.chip:hover { background: var(--white); border-color: var(--orange); color: var(--orange-dk); }
.chip--commission { background: var(--red-lt); color: var(--red-dk); }
.chip--operational { background: var(--orange-lt); color: var(--orange-dk); }
.chip--pending { background: var(--teal-lt); color: var(--teal-dk); }

/* ───── Result info ───── */
.result-info { max-width: 1120px; margin: 14px auto 0; padding: 0 20px; font-size: 13px; color: var(--gray); }

/* ───── Categories（兩層卡片） ───── */
.results { max-width: 1120px; margin: 14px auto 32px; padding: 0 20px; }
.category {
  border-radius: 14px;
  margin-bottom: 24px;
  border: 1px solid var(--border);
  background: var(--white);
  overflow: hidden;
}
.category--commission { background: var(--red-lt); border-color: rgba(255,88,89,.25); }
.category--operational { background: var(--orange-lt); border-color: rgba(255,163,0,.25); }
.category--pending { background: var(--teal-lt); border-color: rgba(0,196,179,.25); }

.category__header {
  padding: 14px 20px; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  font-weight: 700; color: var(--dark);
  user-select: none;
  transition: background .12s;
}
.category__header:hover { background: rgba(0,0,0,.03); }
.category__caret {
  width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px; transition: transform .2s;
}
.category.collapsed .category__caret { transform: rotate(-90deg); }
.category__tier-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.category__tier-dot--commission { background: var(--red); }
.category__tier-dot--operational { background: var(--orange); }
.category__tier-dot--pending { background: var(--teal); }
.category__tier-name { font-size: 12px; color: var(--gray); font-weight: 700; }
.category__name { font-size: 17px; flex: 1; min-width: 0; }
.category__count { font-size: 12px; color: var(--gray); font-weight: 400; padding: 3px 9px; background: var(--white); border-radius: 12px; }

.category__body {
  padding: 0 16px 16px;
  display: grid; gap: 10px;
}
.category.collapsed .category__body { display: none; }

/* ───── Rule 子卡 ───── */
.rule {
  background: var(--white);
  border-radius: 8px;
  padding: 14px 16px 12px;
  box-shadow: var(--shadow);
  border-left: 3px solid var(--gray);
  display: grid; gap: 8px;
  transition: box-shadow .15s, transform .1s;
}
.rule:hover { box-shadow: var(--shadow-md); }
.rule--commission { border-left-color: var(--red); }
.rule--operational { border-left-color: var(--orange); }
.rule--pending { border-left-color: var(--teal); }

.rule__head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.rule__id { font-family: var(--font-en); font-size: 11px; color: var(--gray); background: var(--bg); padding: 2px 8px; border-radius: 4px; font-weight: 700; letter-spacing: .3px; }
.rule__title { font-size: 15px; font-weight: 700; color: var(--dark); flex: 1; min-width: 0; }
.btn-report { display: inline-flex; align-items: center; gap: 4px; background: var(--orange); color: var(--white); padding: 5px 11px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 700; transition: background .15s; }
.btn-report:hover { background: var(--orange-dk); }

.rule__body { font-size: 13.5px; color: var(--dark); line-height: 1.7; white-space: pre-wrap; }
.rule__body em { font-style: normal; color: var(--orange-dk); font-weight: 700; }

.rule__meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; font-size: 11px; color: var(--gray); margin-top: 2px; }
.rule__tag { background: var(--bg); color: var(--gray); padding: 1px 7px; border-radius: 3px; font-weight: 700; }
.rule__source { font-family: var(--font-en); font-style: italic; margin-left: auto; }

.empty { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 15px; background: var(--white); border-radius: 12px; }

/* ───── Footer ───── */
.footer { text-align: center; font-size: 12px; color: var(--gray); padding: 20px; border-top: 1px solid var(--border); }
.footer a { color: var(--orange); text-decoration: none; }

/* ───── Mobile ───── */
@media (max-width: 720px) {
  .header__title { font-size: 16px; }
  .hero h1 { font-size: 18px; }
  .controls__row1 { grid-template-columns: 1fr; }
  .controls__row2 { flex-direction: column; align-items: stretch; }
  .tier-tabs { justify-content: center; }
  .toggle-all { margin-left: 0; }
  .category__name { font-size: 15px; }
  .rule__source { margin-left: 0; }
}
</style>
</head>

<header class="header">
  <div class="header__inner">
    <svg class="header__logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 174.6 34.03" aria-label="橘子蘋果">
      <path fill="#ffa300" d="m24,21c0-4.9,2.36-9.25,6.01-11.99-1.54-.65-3.23-1-5.01-1-7.17,0-13,5.83-13,13s5.83,13,13,13c1.77,0,3.46-.36,5.01-1-3.64-2.74-6.01-7.1-6.01-11.99Z"/>
      <path fill="#00c4b3" d="m31,5c0,.7.14,1.36.4,1.96.2.02.4.04.6.04,2.76,0,5-2.24,5-5,0-.7-.14-1.36-.4-1.96-.2-.02-.4-.04-.6-.04-2.76,0-5,2.24-5,5Z"/>
      <path fill="#ff5859" d="m39,8c-7.17,0-13,5.83-13,13s5.83,13,13,13,13-5.83,13-13-5.83-13-13-13Z"/>
    </svg>
    <div class="header__title">

      <small>業務 / 課務 / 教學組長共用 ・ 三層優先級分類</small>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero__inner">
    <h1>遇到問題不確定怎麼處理？先在這查</h1>
    <p>規則來自會議紀錄 + 犯錯率表單 + 主管裁示。新案件討論出結論後會持續增補。</p>
    <div class="tier-legend">
      <span><span class="dot dot--commission"></span>業績相關</span>
      <span><span class="dot dot--operational"></span>操作規範</span>
      <span><span class="dot dot--pending"></span>待確認</span>
    </div>
  </div>
</section>

<section class="controls">
  <div class="controls__card">
    <div class="controls__row1">
      <input type="search" id="search" class="search-input" placeholder="搜尋（MGM / 紅點 / 30% / Anydesk ...）">
      <select id="role-select" class="role-select">
        <option value="all">全部身分</option>
        <option value="sales">業務</option>
        <option value="course">課務</option>
        <option value="teaching">教學組長</option>
      </select>
    </div>
    <div class="controls__row2">
      <div class="tier-tabs">
        <button class="tier-tab active" data-tier="all" type="button">全部</button>
        <button class="tier-tab" data-tier="commission" type="button">🔴 業績</button>
        <button class="tier-tab" data-tier="operational" type="button">🟡 操作</button>
        <button class="tier-tab" data-tier="pending" type="button">🔵 待確認</button>
      </div>
      <button class="toggle-all" id="toggle-all" type="button">全部收起</button>
    </div>
  </div>
</section>

<section class="quick-jump">
  <div class="quick-jump__inner">
    <span class="quick-jump__label">快速跳轉</span>
    <div id="chip-list" style="display: flex; gap: 6px;"></div>
  </div>
</section>

<div class="result-info" id="result-info">載入中...</div>

<section class="results" id="results"></section>

<script>

// ─── 渲染與互動 ──────────────────────────────────────────────────────
const TIER_LABELS = { commission: "🔴 業績", operational: "🟡 操作", pending: "🔵 待確認" };
const TIER_NAMES  = { commission: "業績相關", operational: "操作規範", pending: "待確認" };
const TIER_ORDER  = ["commission", "operational", "pending"];

const state = {
  tier: "all",
  role: "all",
  search: "",
  collapsedCategories: new Set(),  // 哪些 category 是收起的
};

function $(id) { return document.getElementById(id); }
function slugify(s) { return s.replace(/[^\w一-龥]+/g, "-"); }

function filterRules() {
  const q = state.search.trim().toLowerCase();
  return RULES.filter(r => {
    if (state.tier !== "all" && r.tier !== state.tier) return false;
    if (state.role !== "all" && !(r.roles || []).includes(state.role)) return false;
    if (!q) return true;
    const hay = (r.id + r.title + r.body + r.category + (r.tags||[]).join(",")).toLowerCase();
    return hay.includes(q);
  });
}

function groupByCategory(filtered) {
  // tier → category → rules[]
  const groups = {};
  for (const r of filtered) {
    if (!groups[r.tier]) groups[r.tier] = {};
    if (!groups[r.tier][r.category]) groups[r.tier][r.category] = [];
    groups[r.tier][r.category].push(r);
  }
  return groups;
}

function renderQuickJump(groups) {
  const chips = [];
  for (const tier of TIER_ORDER) {
    if (!groups[tier]) continue;
    for (const category of Object.keys(groups[tier])) {
      const slug = slugify(`${tier}-${category}`);
      chips.push(`<a class="chip chip--${tier}" href="#cat-${slug}" data-slug="cat-${slug}">${category}</a>`);
    }
  }
  $("chip-list").innerHTML = chips.join("");
}

function renderRule(r) {
  const tags = (r.tags||[]).map(t => `<span class="rule__tag">${t}</span>`).join("");
  const report = r.reportable
    ? `<a class="btn-report" href="${FORM_BASE_URL}" target="_blank" rel="noopener">📝 報這條</a>`
    : "";
  return `
    <div class="rule rule--${r.tier}">
      <div class="rule__head">
        <span class="rule__id">${r.id}</span>
        <span class="rule__title">${r.title}</span>
        ${report}
      </div>
      <div class="rule__body">${r.body}</div>
      <div class="rule__meta">
        ${tags}
        <span class="rule__source">${r.source}</span>
      </div>
    </div>`;
}

function render() {
  const filtered = filterRules();
  const groups = groupByCategory(filtered);

  // 結果資訊
  const totalShown = filtered.length;
  const filters = [];
  if (state.role !== "all") {
    const roleLabel = { sales: "業務", course: "課務", teaching: "教學組長" }[state.role];
    filters.push(roleLabel + " 視角");
  }
  if (state.tier !== "all") filters.push(TIER_NAMES[state.tier]);
  if (state.search) filters.push(`搜尋「${state.search}」`);
  const filterText = filters.length ? `（${filters.join(" · ")}）` : "";
  $("result-info").textContent = `共 ${totalShown} / ${RULES.length} 條規則${filterText}`;

  // Quick jump
  renderQuickJump(groups);

  // Categories
  if (totalShown === 0) {
    $("results").innerHTML = '<div class="empty">🔍 沒有符合條件的規則</div>';
    return;
  }

  let html = "";
  for (const tier of TIER_ORDER) {
    if (!groups[tier]) continue;
    for (const [category, rules] of Object.entries(groups[tier])) {
      const slug = slugify(`${tier}-${category}`);
      const catKey = `${tier}|${category}`;
      const collapsed = state.collapsedCategories.has(catKey) ? "collapsed" : "";
      html += `
        <div class="category category--${tier} ${collapsed}" id="cat-${slug}" data-key="${catKey}">
          <div class="category__header" onclick="window.__toggleCategory && window.__toggleCategory('${catKey}')">
            <span class="category__caret">▼</span>
            <span class="category__tier-dot category__tier-dot--${tier}"></span>
            <span class="category__tier-name">${TIER_NAMES[tier]}</span>
            <span class="category__name">${category}</span>
            <span class="category__count">${rules.length} 條</span>
          </div>
          <div class="category__body">
            ${rules.map(renderRule).join("")}
          </div>
        </div>`;
    }
  }
  $("results").innerHTML = html;

  // 更新 toggle-all 按鈕文字
  const totalCategories = Object.values(groups).reduce((sum, t) => sum + Object.keys(t).length, 0);
  const allCollapsed = state.collapsedCategories.size >= totalCategories && totalCategories > 0;
  $("toggle-all").textContent = allCollapsed ? "全部展開" : "全部收起";
}

// Toggle one category（onclick 用，掛到 window）
window.__toggleCategory = function(catKey) {
  if (state.collapsedCategories.has(catKey)) {
    state.collapsedCategories.delete(catKey);
  } else {
    state.collapsedCategories.add(catKey);
  }
  render();
};

// Toggle all
$("toggle-all").addEventListener("click", () => {
  const filtered = filterRules();
  const groups = groupByCategory(filtered);
  const allKeys = [];
  for (const tier of TIER_ORDER) {
    if (!groups[tier]) continue;
    for (const category of Object.keys(groups[tier])) {
      allKeys.push(`${tier}|${category}`);
    }
  }
  const allCollapsed = allKeys.every(k => state.collapsedCategories.has(k));
  if (allCollapsed) {
    state.collapsedCategories.clear();
  } else {
    allKeys.forEach(k => state.collapsedCategories.add(k));
  }
  render();
});

// Search
$("search").addEventListener("input", e => {
  state.search = e.target.value;
  render();
});

// Role
$("role-select").addEventListener("change", e => {
  state.role = e.target.value;
  render();
});

// Tier tabs
document.querySelectorAll(".tier-tab").forEach(btn => {
  btn.addEventListener("click", () => {
    state.tier = btn.dataset.tier;
    document.querySelectorAll(".tier-tab").forEach(b => {
      b.classList.remove("active", "active--commission", "active--operational", "active--pending");
    });
    btn.classList.add("active");
    if (state.tier !== "all") btn.classList.add(`active--${state.tier}`);
    render();
  });
});

// Smooth scroll for chip jump（offset by header height ~70px）
document.addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  e.preventDefault();
  const target = document.getElementById(chip.dataset.slug);
  if (!target) return;
  const headerOffset = 80;
  const y = target.getBoundingClientRect().top + window.pageYOffset - headerOffset;
  window.scrollTo({ top: y, behavior: "smooth" });
  // 如果該 category 是收起的，自動展開
  const key = target.dataset.key;
  if (key && state.collapsedCategories.has(key)) {
    state.collapsedCategories.delete(key);
    render();
  }
});

render();
</script>
