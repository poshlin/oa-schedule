<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="robots" content="noindex,nofollow">
<title>業務規則索引 — 橘子蘋果</title>
<style>
:root {
  color-scheme: light only;
  --orange: #FFA300; --orange-dk: #D48500;
  --red: #FF5859;    --red-dk: #CC3344;
  --teal: #00C4B3;   --teal-dk: #008F83;
  --gray: #646569;   --dark: #2D2D2D;
  --bg: #F5F5F5;     --white: #FFFFFF;
  --shadow: 0 2px 8px rgba(45,45,45,.08);
  --shadow-lg: 0 4px 16px rgba(45,45,45,.12);
  --font-zh: "微軟正黑體", "Microsoft JhengHei", "PingFang TC", sans-serif;
  --font-en: "Trebuchet MS", "Calibri", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: var(--font-zh); color: var(--dark); background: var(--bg); line-height: 1.6; -webkit-font-smoothing: antialiased; }

.header { background: var(--white); border-bottom: 4px solid var(--dark); padding: 16px 20px; position: sticky; top: 0; z-index: 10; box-shadow: var(--shadow); }
.header__inner { max-width: 1080px; margin: 0 auto; display: flex; align-items: center; gap: 16px; }
.header__logo { height: 30px; }
.header__title { font-size: 18px; font-weight: 700; border-left: 3px solid var(--dark); padding-left: 12px; }
.header__title small { display: block; font-size: 12px; color: var(--gray); font-weight: 400; margin-top: 2px; }
.staff-badge { background: var(--dark); color: var(--white); font-size: 11px; padding: 3px 8px; border-radius: 4px; margin-left: 8px; font-weight: 700; letter-spacing: 0.5px; }

.hero { background: linear-gradient(135deg, #2D2D2D 0%, #4A4A4A 100%); color: var(--white); padding: 28px 20px 32px; position: relative; overflow: hidden; }
.hero::after { content: ""; position: absolute; top: -40px; right: -40px; width: 180px; height: 180px; background: var(--orange); opacity: .15; border-radius: 50%; }
.hero__inner { max-width: 1080px; margin: 0 auto; position: relative; z-index: 1; }
.hero h1 { font-size: 22px; margin-bottom: 6px; color: var(--white); }
.hero p { font-size: 14px; opacity: .9; }
.tier-legend { display: flex; gap: 14px; margin-top: 14px; flex-wrap: wrap; font-size: 13px; }
.tier-legend span { display: inline-flex; align-items: center; gap: 6px; }
.tier-legend .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.tier-legend .dot--commission { background: var(--red); }
.tier-legend .dot--operational { background: var(--orange); }
.tier-legend .dot--pending { background: var(--teal); }

.controls { max-width: 1080px; margin: -16px auto 0; padding: 0 20px; position: relative; z-index: 2; }
.controls__card { background: var(--white); border-radius: 12px; box-shadow: var(--shadow-lg); padding: 18px 20px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
.search-input { width: 100%; padding: 12px 16px; font-size: 16px; font-family: var(--font-zh); color: var(--dark);
  background: var(--bg); border: 2px solid transparent; border-radius: 8px; }
.search-input:focus { outline: none; border-color: var(--orange); background: var(--white); }
.tier-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tier-tab { padding: 8px 14px; border-radius: 6px; border: 2px solid var(--bg); background: var(--white); color: var(--dark); font-family: var(--font-zh); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; }
.tier-tab:hover { border-color: var(--gray); }
.tier-tab.active { background: var(--dark); color: var(--white); border-color: var(--dark); }
.tier-tab.active--commission { background: var(--red); border-color: var(--red); }
.tier-tab.active--operational { background: var(--orange); border-color: var(--orange); }
.tier-tab.active--pending { background: var(--teal); border-color: var(--teal); }

.result-info { max-width: 1080px; margin: 14px auto 0; padding: 0 20px; font-size: 13px; color: var(--gray); }

.results { max-width: 1080px; margin: 16px auto 32px; padding: 0 20px; }
.category-group { margin-bottom: 28px; }
.category-group__title {
  font-size: 17px; font-weight: 700; color: var(--dark);
  padding: 8px 12px; margin-bottom: 10px;
  background: var(--white); border-radius: 8px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: var(--shadow);
}
.category-group__count { font-size: 12px; color: var(--gray); font-weight: 400; }

.rule { background: var(--white); border-radius: 10px; box-shadow: var(--shadow);
  padding: 16px 20px; margin-bottom: 10px; border-left: 5px solid var(--gray); }
.rule--commission { border-left-color: var(--red); }
.rule--operational { border-left-color: var(--orange); }
.rule--pending { border-left-color: var(--teal); }
.rule__head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.rule__id { font-family: var(--font-en); font-size: 12px; color: var(--gray);
  background: var(--bg); padding: 2px 8px; border-radius: 4px; font-weight: 700; }
.rule__title { font-size: 16px; font-weight: 700; color: var(--dark); flex: 1; min-width: 0; }
.rule__body { font-size: 14px; color: var(--dark); line-height: 1.75; margin-bottom: 10px; white-space: pre-wrap; }
.rule__body em { font-style: normal; color: var(--orange-dk); font-weight: 700; }
.rule__meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 12px; color: var(--gray); }
.rule__tag { background: var(--bg); color: var(--gray); padding: 2px 8px; border-radius: 4px; font-weight: 700; }
.rule__source { font-family: var(--font-en); font-style: italic; }
.btn-report { display: inline-flex; align-items: center; gap: 4px; background: var(--orange); color: var(--white);
  padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 700;
  margin-left: auto; transition: background .15s; }
.btn-report:hover { background: var(--orange-dk); }

.empty { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 15px; }

.footer { text-align: center; font-size: 12px; color: var(--gray); padding: 20px; border-top: 1px solid #E5E5E5; }
.footer a { color: var(--orange); text-decoration: none; }

@media (max-width: 720px) {
  .header__title { font-size: 16px; }
  .hero h1 { font-size: 18px; }
  .controls__card { grid-template-columns: 1fr; }
  .rule__head { flex-direction: column; align-items: flex-start; }
  .btn-report { margin-left: 0; margin-top: 6px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header__inner">
    <svg class="header__logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 174.6 34.03" aria-label="橘子蘋果">
      <path fill="#ffa300" d="m24,21c0-4.9,2.36-9.25,6.01-11.99-1.54-.65-3.23-1-5.01-1-7.17,0-13,5.83-13,13s5.83,13,13,13c1.77,0,3.46-.36,5.01-1-3.64-2.74-6.01-7.1-6.01-11.99Z"/>
      <path fill="#00c4b3" d="m31,5c0,.7.14,1.36.4,1.96.2.02.4.04.6.04,2.76,0,5-2.24,5-5,0-.7-.14-1.36-.4-1.96-.2-.02-.4-.04-.6-.04-2.76,0-5,2.24-5,5Z"/>
      <path fill="#ff5859" d="m39,8c-7.17,0-13,5.83-13,13s5.83,13,13,13,13-5.83,13-13-5.83-13-13-13Z"/>
    </svg>
    <div class="header__title">
      業務規則索引
      <span class="staff-badge">內部</span>
      <small>業務 / 課務 / 教學組長共用 ・ 三層優先級分類</small>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero__inner">
    <h1>遇到問題不確定怎麼處理？先在這查</h1>
    <p>規則來自會議紀錄 + 犯錯率表單 + 主管裁示。新案件討論出結論後會持續增補。</p>
    <div class="tier-legend">
      <span><span class="dot dot--commission"></span>業績相關（最重要）</span>
      <span><span class="dot dot--operational"></span>操作規範（長期注意）</span>
      <span><span class="dot dot--pending"></span>待確認 / Posh 裁示</span>
    </div>
  </div>
</section>

<section class="controls">
  <div class="controls__card">
    <input type="search" id="search" class="search-input" placeholder="搜尋關鍵字（如：MGM、紅點、追蹤權、30%）...">
    <div class="tier-tabs">
      <button class="tier-tab active" data-tier="all" type="button">全部</button>
      <button class="tier-tab" data-tier="commission" type="button">🔴 業績</button>
      <button class="tier-tab" data-tier="operational" type="button">🟡 操作</button>
      <button class="tier-tab" data-tier="pending" type="button">🔵 待確認</button>
    </div>
  </div>
</section>

<div class="result-info" id="result-info">載入中...</div>

<section class="results" id="results"></section>

<footer class="footer">
  橘子蘋果程式學苑 ｜

  <a href="closest.html">電銷工具</a> ｜

  <a href="https://docs.google.com/spreadsheets/d/1uVZkKdiL5zpdhf4kXDGhV4kTFiXBfZIF2Ewl4-R3oxo/edit" target="_blank">查回應 Sheet</a>
</footer>

<script>
const FORM_BASE_URL = "https://docs.google.com/forms/d/e/1FAIpQLSc3iBaqAofo1jMHqNAi5vleGL2-rMuvpgopiLlxlh8abyQAig/viewform?usp=preview";

// 規則資料：tier = commission / operational / pending
// category = 大分類，用來分組
// reportable = true → 顯示「📝 報這條」按鈕（連到 Google Form）
const RULES = [
  // ──────────────────────────────────────────────────────────────────
  // 🔴 業績相關
  // ──────────────────────────────────────────────────────────────────

  // MGM 追蹤權
  { id: "MGM-01", tier: "commission", category: "MGM 追蹤權",
    title: "預約前主動告知 — 原業務可拿回",
    body: "若家長以任何形式主動告知有推薦名單（需有紀錄為證），在尚未發生預約前，原業務可主動拿回該 MGM 名單，享有優先追蹤權。",
    source: "5/12 業務會議", tags: ["MGM", "追蹤權"] },

  { id: "MGM-02", tier: "commission", category: "MGM 追蹤權",
    title: "跨月尚未敲定場次 — 原業務可重排",
    body: "若為跨月預約，且尚未敲定由哪位業務負責體驗場次，原業務仍符合 MGM 優先追蹤權，可自行重新安排預約。",
    source: "5/12 業務會議", tags: ["MGM", "追蹤權", "跨月"] },

  { id: "MGM-03", tier: "commission", category: "MGM 追蹤權",
    title: "已預約在他人場次 — 適用借教室規則",
    body: "若該名單已經預約在其他業務的場次，則適用『借教室』規則處理。",
    source: "5/12 業務會議", tags: ["MGM", "借教室"] },

  { id: "MGM-04", tier: "commission", category: "MGM 追蹤權",
    title: "預約後才得知 MGM — 原業務無追蹤權",
    body: "若在名單預約之後才獲得 MGM 紀錄，原業務無追蹤權，該名單歸屬於該體驗場次的業務。",
    source: "5/12 業務會議", tags: ["MGM", "追蹤權"] },

  { id: "MGM-05", tier: "commission", category: "MGM 追蹤權",
    title: "訊息群組內 MGM — 第一位回覆者取得",
    body: "正式生若在訊息中提及 MGM，由第一位回覆訊息者取得該 MGM 的優先追蹤權。",

  // 公池規範
  { id: "POOL-01", tier: "commission", category: "公池名單規範",

    body: "無正式課程學生超過兩個月無聯絡紀錄，即轉為公池名單（包含任何 MGM 推薦名單）。",
    source: "5/12 業務會議", tags: ["公池", "新生"] },

  { id: "POOL-02", tier: "commission", category: "公池名單規範",
    title: "正式生公池 — 2 個月無聯繫開放撈取",
    body: "正式生 2 個月無聯繫紀錄，同樣開放給所有業務撈取。",
    source: "5/12 業務會議", tags: ["公池", "正式生"] },

  { id: "POOL-03", tier: "commission", category: "公池名單規範",
    title: "撈取後 LINE@ 命名規範（嚴格執行）",

    source: "5/12 業務會議", tags: ["公池", "LINE@", "命名規範"] },

  { id: "POOL-04", tier: "commission", category: "公池名單規範",
    title: "撈取後系統轉換流程",
    body: "家長回覆訊息且確認要繼續追蹤後，業務需自行將資訊提供給 Posh，協助於系統將負責業務修改為自己。",
    source: "5/12 業務會議", tags: ["公池", "系統"] },

  { id: "POOL-05", tier: "commission", category: "公池名單規範",

  // 正式生服務

    body: "系統上的正式生負責業務，享有優先服務該家長的權益。",

  { id: "OFFICIAL-02", tier: "commission", category: "正式生服務權",

  { id: "COMMISSION-02", tier: "commission", category: "業績分潤 30%",

  // 追蹤權歸屬

  { id: "TRACK-03", tier: "commission", category: "追蹤權歸屬",

  { id: "OPS-01", tier: "operational", category: "成交流程",

// ─── 渲染與互動 ──────────────────────────────────────────────────────
let currentTier = "all";
let currentSearch = "";

const TIER_LABELS = { commission: "🔴 業績", operational: "🟡 操作", pending: "🔵 待確認" };
const TIER_ORDER = ["commission", "operational", "pending"];

function $(id) { return document.getElementById(id); }

function filterAndGroup() {
  const q = currentSearch.trim().toLowerCase();
  const filtered = RULES.filter(r => {
    if (currentTier !== "all" && r.tier !== currentTier) return false;
    if (!q) return true;
    const haystack = (r.id + r.title + r.body + r.category + (r.tags||[]).join(",")).toLowerCase();
    return haystack.includes(q);
  });
  // group by tier → category
  const groups = {};  // tier → category → rules[]
  for (const r of filtered) {
    if (!groups[r.tier]) groups[r.tier] = {};
    if (!groups[r.tier][r.category]) groups[r.tier][r.category] = [];
    groups[r.tier][r.category].push(r);
  }
  return { filtered, groups };
}

function renderRule(r) {
  const tierCls = `rule--${r.tier}`;
  const tags = (r.tags||[]).map(t => `<span class="rule__tag">${t}</span>`).join("");
  const report = r.reportable
    ? `<a class="btn-report" href="${FORM_BASE_URL}" target="_blank" rel="noopener">📝 報這條</a>`
    : "";
  return `
    <div class="rule ${tierCls}">
      <div class="rule__head">
        <span class="rule__id">${r.id}</span>
        <span class="rule__title">${r.title}</span>
        ${report}
      </div>
      <div class="rule__body">${r.body}</div>
      <div class="rule__meta">
        ${tags}
        <span class="rule__source">${r.source}</span>
      </div>
    </div>`;
}

function render() {
  const { filtered, groups } = filterAndGroup();
  $("result-info").textContent = `共 ${filtered.length} / ${RULES.length} 條規則` +
    (currentSearch ? `（搜尋「${currentSearch}」）` : "");

  if (filtered.length === 0) {
    $("results").innerHTML = '<div class="empty">🔍 沒有符合條件的規則</div>';
    return;
  }

  let html = "";
  for (const tier of TIER_ORDER) {
    if (!groups[tier]) continue;
    for (const [category, rules] of Object.entries(groups[tier])) {
      html += `
        <div class="category-group">
          <div class="category-group__title">
            ${TIER_LABELS[tier]} ・ ${category}
            <span class="category-group__count">${rules.length} 條</span>
          </div>
          ${rules.map(renderRule).join("")}
        </div>`;
    }
  }
  $("results").innerHTML = html;
}

// search input
$("search").addEventListener("input", e => {
  currentSearch = e.target.value;
  render();
});

// tier tabs
document.querySelectorAll(".tier-tab").forEach(btn => {
  btn.addEventListener("click", () => {
    currentTier = btn.dataset.tier;
    document.querySelectorAll(".tier-tab").forEach(b => {
      b.classList.remove("active", "active--commission", "active--operational", "active--pending");
    });
    btn.classList.add("active");
    if (currentTier !== "all") btn.classList.add(`active--${currentTier}`);
    render();
  });
});

render();
</script>
